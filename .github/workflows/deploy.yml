name: Deploy Dashboard

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    # Weekdays, every ~15 minutes in Europe/Warsaw from 10:00 to 15:30
    # (same real execution moments as previous America/New_York 04:00-09:30).
    - cron: "2,17,32,47 10-14 * * 1-5"
      timezone: "Europe/Warsaw"
    - cron: "2,17,32 15 * * 1-5"
      timezone: "Europe/Warsaw"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:

  deploy:

    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install
        run: npm install

      - name: Build dashboard data
        run: npm run build:data

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
