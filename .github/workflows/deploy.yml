name: Deploy Dashboard

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    # Weekdays, every 15 minutes in UTC from 08:00 to 13:30.
    - cron: "*/15 4-8 * * 1-5"
      timezone: "America/New_York"
    - cron: "0,15,30 9 * * 1-5"
      timezone: "America/New_York"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:

  deploy:

    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install
        run: npm install

      - name: Build dashboard data
        run: npm run build:data

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
