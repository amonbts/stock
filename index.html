<!doctype html>
<html lang="en" data-bs-theme="dark">

<head>
  <meta charset="utf-8">
  <title>Trading Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">

  <script src="https://s3.tradingview.com/tv.js"></script>
</head>

<body>
  <nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom">
    <div class="container">
      <a class="navbar-brand" href="./">
        Trading Dashboard
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link active" href="./index.html">
              Dashboard
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="./mini-chart.html">
              Mini Charts
            </a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container py-4">

    <header class="pb-3 mb-4 border-bottom">
      <h1 id="dashboard-title"></h1>
      <p class="text-body-secondary" id="dashboard-description"></p>
    </header>

    <div class="mb-4">
      <div class="row g-3 align-items-center mb-3">
        <div class="col-md-6">
          <input type="text" id="search-input" class="form-control" placeholder="Search symbol, title or group...">
        </div>
      </div>
      <div class="d-flex flex-wrap gap-2" id="group-filters">
      </div>
    </div>


    <div id="widgets-grid" class="row row-cols-1 row-cols-md-1 g-4">
    </div>

  </div>

  <script src="app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
